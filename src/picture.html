<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>picture</title>
    <style>
        * {
            box-sizing: border-box;
            padding: 0;
            margin: 0;
        }

        html,
        body {
            height: 100%;
        }

        body {
            padding-block: 2rem 4rem;
            background: #f7d6ff;
        }

        @keyframes slide-fade-in {
            from {
                opacity: 0;
                box-shadow: none;
                transform: scale(.8) translateY(15vh);
            }
        }

        .cards {
            display: grid;
            gap: 1rem;
            grid-auto-flow: dense;
            /* 移动端自适应核心：自动填充列，最小180px，最大1fr */
            grid-template-columns: repeat(auto-fill, minmax(min(100%, 180px), 1fr));
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .card {
            animation: slide-fade-in both;
            animation-timeline: view();
            animation-range: contain 0% contain 50%;
            border-radius: 10px;
            box-shadow: 0px 8px 20px #00000022;
            font-size: clamp(18px, 5vw, 32px);
            letter-spacing: 2px;
            color: #fff;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background-image: linear-gradient(to bottom right,
                    #91defe,
                    #99c0f9,
                    #bdb6ec,
                    #d7b3e3,
                    #efb3d5,
                    #f9bccc);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 1rem;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 平板以上布局 */
        @media (min-width: 768px) {
            .cards {
                gap: 2rem;
            }

            .card {
                letter-spacing: 5px;
            }

            .card:nth-of-type(4n) {
                grid-column: span 2;
            }

            .card:nth-of-type(5n) {
                grid-column: span 2;
            }

            .card:nth-of-type(7n) {
                grid-row: span 2;
            }
        }
    </style>
</head>

<body>
    <div class="cards">
        <div class="card">TEXT</div>
        <div class="card">TEXT</div>
        <div class="card">TEXT</div>
        <div class="card">TEXT</div>
        <div class="card"> <img src="./01.png"></div>
        <div class="card">TEXT</div>
        <div class="card">TEXT</div>
        <div class="card">TEXT</div>
        <div class="card"> <img src="./02.png"></div>
        <div class="card"> <img src="./03.png"></div>
        <div class="card">TEXT</div>
        <div class="card">TEXT</div>
        <div class="card">TEXT</div>
        <div class="card">TEXT</div>
        <div class="card"> <img src="./04.png"></div>
        <div class="card">TEXT</div>
        <div class="card">TEXT</div>
        <div class="card">TEXT</div>
        <div class="card">TEXT</div>
        <div class="card"> <img src="./05.png"></div>
        <div class="card">TEXT</div>
        <div class="card">TEXT</div>
        <div class="card">TEXT</div>
        <div class="card">TEXT</div>
        <div class="card"> <img src="./06.png"></div>
        <div class="card">TEXT</div>
        <div class="card">TEXT</div>
        <div class="card"> <img src="./07.png"></div>
        <div class="card">TEXT</div>
        <div class="card">TEXT</div>
        <div class="card">TEXT</div>
    </div>
</body>

</html>
